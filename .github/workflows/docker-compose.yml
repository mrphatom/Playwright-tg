version: '3.8'

services:
  bot:
    image: ghcr.io/YOUR_GITHUB_USERNAME/YOUR_REPO_NAME:main
    container_name: telescout-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Mount sessions locally so logins persist across container updates
      - ./sessions:/app/sessions
    deploy:
      resources:
        limits:
          # Hard limit to prevent the bot from crashing the whole VPS
          memory: 1.5G
        reservations:
          memory: 512M


