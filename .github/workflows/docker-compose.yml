version: '3.8'

services:
  bot:
    # Image names MUST be lowercase, so Playwright-tg becomes playwright-tg
    image: ghcr.io/mrphatom/playwright-tg:main
    container_name: telescout-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./sessions:/app/sessions
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 512M
